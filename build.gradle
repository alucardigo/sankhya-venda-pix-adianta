plugins {
    id 'java'
    id 'application'
    id 'jacoco'
}

// JaCoCo configuration for Java 21 compatibility
jacoco {
    toolVersion = "0.8.11"  // Updated version that supports Java 21
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = false
        csv.required = false
        html.outputLocation = layout.buildDirectory.dir('jacocoHtml')
    }
    
    // Exclude JDK internal classes and problematic packages from instrumentation
    executionData.setFrom(fileTree(dir: project.buildDir, includes: ['jacoco/*.exec']))
    
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                'sun/**',
                'com/sun/**',
                'java/**',
                'javax/**',
                'org/jcp/**',
                'jdk/**',
                '**/module-info.class'
            ])
        }))
    }
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
    
    // Java 8 compatibility - no module system arguments needed
    jvmArgs = [
        '-Djava.util.logging.manager=org.jboss.logmanager.LogManager',
        '--enable-preview'
    ]
    
    // Set system properties for Java 8 compatibility
    systemProperty 'jacoco-agent.destfile', file("$buildDir/jacoco/test.exec")
}

group = 'br.com.bellube.sankhya'
version = '1.0.0-SNAPSHOT'

// IMPORTANTE: Usar Java 8 para compatibilidade com Sankhya OM EIP
java {
    sourceCompatibility = JavaVersion.toVersion("25")
    targetCompatibility = JavaVersion.toVersion("25")
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += '--enable-preview'
}

// OVERRIDE: Forçar Java 8 para tasks específicas do VendaPixAdianta
ext.vendaPixAdiantaJavaVersion = '1.8'

repositories {
    mavenCentral()
    flatDir {
        dirs 'libs', 'wildfly/wildfly/standalone/deployments/sankhyaw.ear/lib',
             'wildfly/wildfly/standalone/deployments/sankhyaw.ear/ejb'
    }
}

// Configuração de dependências Sankhya
configurations {
    sankhyaRuntime
    vendaPixAdiantaCompile
    receitaBTACompile  // Nova configuração para ReceitaBTA
}

configurations.all {
    resolutionStrategy {
        force 'junit:junit:4.13.2'
        force 'org.junit.jupiter:junit-jupiter:5.10.0'
    }
    exclude group: 'junit', module: 'junit-dep'
    exclude group: 'org.hamcrest', module: 'hamcrest-all'
}

// SourceSets personalizados para VendaPixAdianta (apenas arquivos que o PowerShell compila)
sourceSets {
    vendaPixAdianta {
        java {
            srcDirs = ['eclipse/eclipse/workspace/Modelo-Model/ejbsrc']
            // CRÍTICO: Incluir apenas os 6 arquivos que o PowerShell compila com sucesso
            include 'br/com/bellube/sankhya/eventos/VendaPixAdianta/event/VendaPixAdiantaEvent.java'
            include 'br/com/bellube/sankhya/eventos/VendaPixAdianta/async/AdiantamentoTask.java'
            include 'br/com/bellube/sankhya/eventos/VendaPixAdianta/async/AsyncAdiantamentoProcessor.java'
            include 'br/com/bellube/sankhya/eventos/VendaPixAdianta/service/AdiantamentoService.java'
            include 'br/com/bellube/sankhya/eventos/VendaPixAdianta/util/ConfiguracaoHelper.java'
            include 'br/com/bellube/sankhya/eventos/VendaPixAdianta/util/AuditLogger.java'
            // EXCLUIR arquivos com records que causam problemas:
            // - ProcessamentoTask.java (record)
            // - TaskQueueManager.java (inner record)
            // - AsyncTaskProcessor.java 
            // - Outros arquivos extras
        }
    }

    // NOVO: SourceSet para ReceitaBTA (replicando build-ReceitaBTA.ps1)
    receitaBTA {
        java {
            srcDirs = ['eclipse/eclipse/workspace/Modelo-Model/ejbsrc']
            // Classes principais
            include 'br/com/sankhya/action/BotaoAcao/ReceitaBTA.java'
            include 'br/com/sankhya/extensions/eventoprogramavel/ReceitaBTAEventoProgramavel.java'
            // Classes de notificação - Eventos Programáveis
            include 'br/com/sankhya/extensions/eventoprogramavel/NotificacaoParceiroEventoProgramavel.java'
            include 'br/com/sankhya/extensions/eventoprogramavel/NotificacaoVendaEventoProgramavel.java'
            // Classes de notificação - Botões de Ação
            include 'br/com/sankhya/action/BotaoAcao/VerificarNotificacoesPosVenda.java'
            include 'br/com/sankhya/action/BotaoAcao/VerificarNotificacoesParceiro.java'
            // Classes de processamento em lote - Botões de Ação
            include 'br/com/sankhya/action/BotaoAcao/ReceitaBTALote.java'
            include 'br/com/sankhya/action/BotaoAcao/ReceitaBTALotePausar.java'
            include 'br/com/sankhya/action/BotaoAcao/ReceitaBTALoteResumir.java'
            include 'br/com/sankhya/action/BotaoAcao/ReceitaBTALoteStatus.java'
            include 'br/com/sankhya/action/BotaoAcao/ReceitaBTALoteReiniciar.java'
            include 'br/com/sankhya/action/BotaoAcao/ReceitaBTALoteTerminar.java'
        }
    }

    vendaPixAdiantaTest {
        java {
            srcDirs = ['test']
            include 'br/com/bellube/sankhya/eventos/VendaPixAdianta/**/*.java'
        }
        compileClasspath += sourceSets.vendaPixAdianta.output
        runtimeClasspath += sourceSets.vendaPixAdianta.output
    }

    // NOVO: SourceSet para testes do ReceitaBTA
    receitaBTATest {
        java {
            srcDirs = ['test']
            include 'br/com/sankhya/**/*Test.java'
        }
        compileClasspath += sourceSets.receitaBTA.output
        runtimeClasspath += sourceSets.receitaBTA.output
    }
}

dependencies {
    // Lombok
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'
    testCompileOnly 'org.projectlombok:lombok:1.18.30'
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.30'

    // VendaPixAdianta specific dependencies
    vendaPixAdiantaCompile name: 'SankhyaW-extensions', version: '', ext: 'jar'
    vendaPixAdiantaCompile name: 'jape', version: '', ext: 'jar'
    vendaPixAdiantaCompile name: 'mge-modelcore', version: '', ext: 'jar'

    // Fallback dependencies from libs folder
    vendaPixAdiantaCompile fileTree(dir: 'libs', include: ['*.jar'])

    // NOVO: ReceitaBTA specific dependencies (replicando PowerShell)
    receitaBTACompile name: 'SankhyaW-extensions', version: '', ext: 'jar'
    receitaBTACompile name: 'jape', version: '', ext: 'jar'
    receitaBTACompile name: 'mge-modelcore', version: '', ext: 'jar'
    receitaBTACompile name: 'json-20140107', version: '', ext: 'jar'

    // Dependências do EAR do WildFly (Sankhya)
    receitaBTACompile fileTree(dir: 'wildfly/wildfly/standalone/deployments/sankhyaw.ear', include: ['**/*.jar'])

    // Fallback dependencies from libs folder
    receitaBTACompile fileTree(dir: 'libs', include: ['*.jar'])

    // Fallback para api_outros (org.json alternativo)
    receitaBTACompile fileTree(dir: 'eclipse/eclipse/workspace/api_outros', include: ['json-*.jar'])

    // ===== JUNIT 5 COMPLETE SETUP =====
    testImplementation platform('org.junit:junit-bom:5.10.3')  // BOM para versões consistentes
    testImplementation 'org.junit.jupiter:junit-jupiter-api'     // API principal JUnit 5
    testImplementation 'org.junit.jupiter:junit-jupiter-params'  // Para @ParameterizedTest
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'     // Engine para executar testes
    testImplementation 'org.junit.platform:junit-platform-suite-api:1.10.3'  // Para @Suite, @SelectPackages
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher' // Launcher
    testRuntimeOnly 'org.junit.platform:junit-platform-suite-engine:1.10.3'  // Para executar suites

    // JUnit 4 for compatibility (Vintage Engine)
    testImplementation 'junit:junit:4.13.2'
    testRuntimeOnly 'org.junit.vintage:junit-vintage-engine:5.10.3'

    // ===== MOCKITO COMPLETE SETUP (versão 5.x para Java 21) =====
    testImplementation 'org.mockito:mockito-core:5.6.0'          // Core Mockito
    testImplementation 'org.mockito:mockito-junit-jupiter:5.6.0' // Integração JUnit 5
    // Nota: mockito-inline foi integrado ao mockito-core nas versões 5.x

    // ===== BYTE BUDDY (necessário para Mockito) =====
    testImplementation 'net.bytebuddy:byte-buddy:1.14.11'        // ByteBuddy principal
    testImplementation 'net.bytebuddy:byte-buddy-agent:1.14.11'  // ByteBuddy Agent

    // ===== HAMCREST COMPLETE SETUP =====
    testImplementation 'org.hamcrest:hamcrest:2.2'               // Hamcrest matchers
    testImplementation 'org.hamcrest:hamcrest-library:2.2'       // Biblioteca adicional de matchers

    // ===== ASSERTJ para fluent assertions =====
    testImplementation 'org.assertj:assertj-core:3.25.1'

    // ===== TESTING UTILITIES =====
    testImplementation 'org.apiguardian:apiguardian-api:1.1.2'   // API Guardian annotations

    // VendaPixAdianta test dependencies - CORRIGIDO para Gradle 8.0+
    vendaPixAdiantaTestImplementation files(sourceSets.vendaPixAdianta.output.classesDirs)
    vendaPixAdiantaTestImplementation files(sourceSets.vendaPixAdianta.output.resourcesDir)
    
    // Direct file references for Sankhya JARs (avoiding flatDir repository issues)
    if (file('SankhyaW-extensions.jar').exists()) {
        vendaPixAdiantaTestImplementation files('SankhyaW-extensions.jar')
    }
    if (file('wildfly/wildfly/standalone/deployments/sankhyaw.ear/lib/jape.jar').exists()) {
        vendaPixAdiantaTestImplementation files('wildfly/wildfly/standalone/deployments/sankhyaw.ear/lib/jape.jar')
    }
    if (file('wildfly/wildfly/standalone/deployments/sankhyaw.ear/ejb/mge-modelcore.jar').exists()) {
        vendaPixAdiantaTestImplementation files('wildfly/wildfly/standalone/deployments/sankhyaw.ear/ejb/mge-modelcore.jar')
    }
    
    // Fallback to libs directory
    vendaPixAdiantaTestImplementation fileTree(dir: 'libs', include: ['*.jar'])
    vendaPixAdiantaTestImplementation 'org.junit.jupiter:junit-jupiter'
    vendaPixAdiantaTestImplementation 'org.mockito:mockito-core:5.6.0'  // CORRIGIDO: usar mockito-core consistente

    // Test dependencies from libs/test
    vendaPixAdiantaTestImplementation fileTree(dir: 'libs/test', include: ['*.jar'])

    // NOVO: ReceitaBTA test dependencies
    receitaBTATestImplementation files(sourceSets.receitaBTA.output.classesDirs)
    receitaBTATestImplementation files(sourceSets.receitaBTA.output.resourcesDir)
    
    // Direct file references for Sankhya JARs (avoiding flatDir repository issues)
    if (file('SankhyaW-extensions.jar').exists()) {
        receitaBTATestImplementation files('SankhyaW-extensions.jar')
    }
    if (file('wildfly/wildfly/standalone/deployments/sankhyaw.ear/lib/jape.jar').exists()) {
        receitaBTATestImplementation files('wildfly/wildfly/standalone/deployments/sankhyaw.ear/lib/jape.jar')
    }
    if (file('wildfly/wildfly/standalone/deployments/sankhyaw.ear/ejb/mge-modelcore.jar').exists()) {
        receitaBTATestImplementation files('wildfly/wildfly/standalone/deployments/sankhyaw.ear/ejb/mge-modelcore.jar')
    }
    
    // Fallback to libs directory
    receitaBTATestImplementation fileTree(dir: 'libs', include: ['*.jar'])
    receitaBTATestImplementation 'org.junit.jupiter:junit-jupiter'
    receitaBTATestImplementation 'org.mockito:mockito-core:5.6.0'  // CORRIGIDO: usar mockito-core consistente
    receitaBTATestImplementation fileTree(dir: 'libs/test', include: ['*.jar'])

    // Jakarta EE
    compileOnly 'jakarta.platform:jakarta.jakartaee-api:10.0.0'

    // Logging
    implementation 'org.slf4j:slf4j-api:2.0.9'
    implementation 'org.jboss.logging:jboss-logging:3.5.3.Final'
    testRuntimeOnly 'org.jboss.logmanager:jboss-logmanager:2.1.19.Final'
}

// NOVO: Task para limpar ReceitaBTA (replicando limpeza do PowerShell)
task cleanReceitaBTA(type: Delete) {
    description = 'Limpa arquivos de build do ReceitaBTA'
    group = 'receitaBTA'

    delete "$buildDir/classes/receitaBTA"
    delete fileTree(dir: 'dist', include: 'ReceitaBTA.jar')

    doFirst {
        println("[INFO] Limpando diretório de build antigo...")
        println("[INFO] Limpando diretório de distribuição antigo...")

        // Limpar workspace duplicado se existir (como PowerShell faz)
        def duplicateWorkspace = file('eclipse-jee-2025-06-R-win32-x86_64/eclipse/workspace/Modelo-Model')
        if (duplicateWorkspace.exists()) {
            println("[INFO] Removendo workspace duplicado para evitar erros de classes duplicadas...")
            duplicateWorkspace.deleteDir()
            println("[INFO] Workspace duplicado removido com sucesso.")
        }
    }

    doLast {
        println("[INFO] ✓ Limpeza concluída")
    }
}

// NOVO: Compilar ReceitaBTA (replicando comportamento PowerShell)
task compileReceitaBTA(type: JavaCompile) {
    description = 'Compila as classes do módulo ReceitaBTA (replicando comportamento PowerShell)'
    group = 'receitaBTA'

    source = sourceSets.receitaBTA.java
    destinationDirectory = file("$buildDir/classes/receitaBTA")

    // Construir classpath exatamente como o PowerShell faz (ordem específica)
    classpath = files()

    // 1. SankhyaW-extensions.jar (primeira prioridade)
    def extensionsJar = file('SankhyaW-extensions.jar')
    if (extensionsJar.exists()) {
        classpath += files(extensionsJar)
    }

    // 2. JARs específicos do EAR (ordem do PowerShell)
    def earPath = file('wildfly/wildfly/standalone/deployments/sankhyaw.ear')
    def japeJar = file("$earPath/lib/jape.jar")
    def modelCoreJar = file("$earPath/ejb/mge-modelcore.jar")
    def jsonJar = file("$earPath/lib/json-20140107.jar")

    def minimalCandidates = []
    if (extensionsJar.exists()) minimalCandidates += extensionsJar
    if (japeJar.exists()) minimalCandidates += japeJar
    if (modelCoreJar.exists()) minimalCandidates += modelCoreJar
    if (jsonJar.exists()) minimalCandidates += jsonJar

    // Replicar lógica do PowerShell: usar classpath mínimo se possível
    if (minimalCandidates.size() >= 4) {
        println("[INFO] Usando classpath mínimo (Extensions + JAPE + ModelCore + org.json).")
        classpath = files(minimalCandidates)
    } else {
        println("[WARNING] Classpath mínimo incompleto. Usando classpath expandido (libs + EAR).")

        // 3. Todo o EAR se os específicos não existirem
        if (earPath.exists()) {
            classpath += fileTree(dir: earPath, include: ['**/*.jar'])
        }

        // 4. Fallback para libs/ 
        if (file('libs').exists()) {
            classpath += fileTree(dir: 'libs', include: ['*.jar'])
        }

        // 5. Fallback para api_outros (org.json alternativo)
        def apiOutros = file('eclipse/eclipse/workspace/api_outros')
        if (apiOutros.exists()) {
            def jsonJars = fileTree(dir: apiOutros, include: ['json-*.jar'])
            if (!jsonJars.isEmpty()) {
                classpath += jsonJars
            }
        }
    }

    options.encoding = 'UTF-8'
    // CRÍTICO: Usar Java 8 exatamente como PowerShell
    sourceCompatibility = '25'
    targetCompatibility = '25'

    // Suprimir warnings
    options.compilerArgs += ['-Xlint:-options']

    doFirst {
        println("[INFO] Compilando fontes...")
        println("[INFO] Classes a serem compiladas: ${source.files.size()}")

        // Lista classes que serão compiladas (replicando PowerShell)
        def expectedClasses = [
            'ReceitaBTA.java',
            'ReceitaBTAEventoProgramavel.java',
            'NotificacaoParceiroEventoProgramavel.java',
            'NotificacaoVendaEventoProgramavel.java',
            'VerificarNotificacoesPosVenda.java',
            'VerificarNotificacoesParceiro.java',
            'ReceitaBTALote.java',
            'ReceitaBTALotePausar.java',
            'ReceitaBTALoteResumir.java',
            'ReceitaBTALoteStatus.java',
            'ReceitaBTALoteReiniciar.java',
            'ReceitaBTALoteTerminar.java'
        ]

        source.files.each { file ->
            def fileName = file.name
            if (expectedClasses.contains(fileName)) {
                println("[INFO]   - ${fileName}")
            } else {
                println("[WARNING] Arquivo não esperado: ${fileName}")
            }
        }

        // Validar arquivo obrigatório (como PowerShell faz)
        def mainFile = source.files.find { it.name == 'ReceitaBTA.java' }
        if (!mainFile) {
            throw new GradleException("Arquivo fonte não encontrado: ReceitaBTA.java")
        }

        // Verificar dependências críticas
        if (!extensionsJar.exists()) {
            println("[WARNING] SankhyaW-extensions.jar não encontrado na raiz. A compilação pode falhar.")
        }

        if (classpath.isEmpty()) {
            println("[WARNING] Classpath está vazio. Verifique se as dependências necessárias estão em libs/ e SankhyaW-extensions.jar")
        }
    }

    doLast {
        def destDir = destinationDirectory.get().asFile.absolutePath
        def mainClass = file("$destDir/br/com/sankhya/action/BotaoAcao/ReceitaBTA.class")

        if (!mainClass.exists()) {
            throw new GradleException("Falha na compilação: classe principal não encontrada em $mainClass")
        }

        println("(INFO) ReceitaBTA.class compilado com sucesso")

        // Verificar outras classes compiladas (como PowerShell faz)
        def expectedCompiledClasses = [
            [path: "$destDir/br/com/sankhya/extensions/eventoprogramavel/ReceitaBTAEventoProgramavel.class", name: "ReceitaBTAEventoProgramavel"],
            [path: "$destDir/br/com/sankhya/extensions/eventoprogramavel/NotificacaoParceiroEventoProgramavel.class", name: "NotificacaoParceiroEventoProgramavel"],
            [path: "$destDir/br/com/sankhya/extensions/eventoprogramavel/NotificacaoVendaEventoProgramavel.class", name: "NotificacaoVendaEventoProgramavel"],
            [path: "$destDir/br/com/sankhya/action/BotaoAcao/VerificarNotificacoesPosVenda.class", name: "VerificarNotificacoesPosVenda"],
            [path: "$destDir/br/com/sankhya/action/BotaoAcao/VerificarNotificacoesParceiro.class", name: "VerificarNotificacoesParceiro"],
            [path: "$destDir/br/com/sankhya/action/BotaoAcao/ReceitaBTALote.class", name: "ReceitaBTALote"],
            [path: "$destDir/br/com/sankhya/action/BotaoAcao/ReceitaBTALotePausar.class", name: "ReceitaBTALotePausar"],
            [path: "$destDir/br/com/sankhya/action/BotaoAcao/ReceitaBTALoteResumir.class", name: "ReceitaBTALoteResumir"],
            [path: "$destDir/br/com/sankhya/action/BotaoAcao/ReceitaBTALoteStatus.class", name: "ReceitaBTALoteStatus"],
            [path: "$destDir/br/com/sankhya/action/BotaoAcao/ReceitaBTALoteReiniciar.class", name: "ReceitaBTALoteReiniciar"],
            [path: "$destDir/br/com/sankhya/action/BotaoAcao/ReceitaBTALoteTerminar.class", name: "ReceitaBTALoteTerminar"]
        ]

        expectedCompiledClasses.each { classInfo ->
            def classFile = file(classInfo.path)
            if (classFile.exists()) {
                println("(INFO) ${classInfo.name}.class compilado com sucesso")
            } else {
                println("[WARNING] Classe não encontrada: ${classInfo.name}")
            }
        }

        println("[INFO] ✓ Compilação concluída usando Java ${sourceCompatibility}")
        println("[INFO] ✓ Compatível com Sankhya ERP (Java 8)")
    }
}

// NOVO: Criar JAR do ReceitaBTA (replicando saída do PowerShell)
task receitaBTAJar(type: Jar) {
    description = 'Cria o JAR ReceitaBTA.jar (replicando PowerShell)'
    group = 'receitaBTA'
    dependsOn compileReceitaBTA

    from compileReceitaBTA.destinationDirectory
    archiveBaseName = 'ReceitaBTA'
    archiveVersion = '' // Sem versão, exatamente como PowerShell
    destinationDirectory = file('dist')

    doFirst {
        // Criar diretório dist se não existir
        def distDir = file('dist')
        if (!distDir.exists()) {
            distDir.mkdirs()
        }

        // Remover JAR anterior se existir (como PowerShell faz)
        def outJar = file('dist/ReceitaBTA.jar')
        if (outJar.exists()) {
            outJar.delete()
        }

        println("(INFO) Gerando JAR: ${outJar.absolutePath}")
    }

    doLast {
        def jarLocation = archiveFile.get().asFile.absolutePath
        println("(SUCESSO) JAR do sistema completo de notificacoes ReceitaBTA gerado em: ${jarLocation}")
        println("(INFO) O JAR inclui todas as classes compiladas no diretório ${compileReceitaBTA.destinationDirectory.get().asFile.absolutePath}")
        println("(INFO) O JAR inclui todas as classes do sistema de notificacoes:")
        println("(INFO)   - ReceitaBTA")
        println("(INFO)   - ReceitaBTAEventoProgramavel")
        println("(INFO)   - NotificacaoParceiroEventoProgramavel")
        println("(INFO)   - NotificacaoVendaEventoProgramavel")
        println("(INFO)   - VerificarNotificacoesPosVenda")
        println("(INFO)   - VerificarNotificacoesParceiro")
        println("(INFO)   - ReceitaBTALote")
        println("(INFO)   - ReceitaBTALotePausar")
        println("(INFO)   - ReceitaBTALoteResumir")
        println("(INFO)   - ReceitaBTALoteStatus")
        println("(INFO)   - ReceitaBTALoteReiniciar")
        println("(INFO)   - ReceitaBTALoteTerminar")
    }
}

// NOVO: Task principal para compilar e empacotar ReceitaBTA (equivalente ao script PowerShell)
task buildReceitaBTA {
    description = 'Compila e empacota ReceitaBTA (equivalente ao build-ReceitaBTA.ps1)'
    group = 'receitaBTA'
    dependsOn cleanReceitaBTA, receitaBTAJar

    doLast {
        println("[SUCESSO] Build ReceitaBTA concluído com sucesso!")
        println("[INFO] Execute: gradle buildReceitaBTA para recompilar")
        println("[INFO] JAR disponível em: dist/ReceitaBTA.jar")
    }
}

