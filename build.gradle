// Compilar VendaPixAdianta usando abordagem simplificada (compatível com PowerShell)
task compileVendaPixAdianta(type: JavaCompile) {
    description = 'Compila as classes do módulo VendaPixAdianta (replicando comportamento PowerShell)'
    group = 'vendaPixAdianta'

    source = sourceSets.vendaPixAdianta.java
    destinationDirectory = file("$buildDir/classes/vendaPixAdianta")

    // SIMPLIFICADO: Construir classpath como o PowerShell faz
    classpath = files()

    // Adicionar apenas os JARs que o PowerShell usa
    def sankhyaJars = [
        file('SankhyaW-extensions.jar'),
        file('wildfly/wildfly/standalone/deployments/sankhyaw.ear/lib/jape.jar'),
        file('wildfly/wildfly/standalone/deployments/sankhyaw.ear/ejb/mge-modelcore.jar')
    ]

    sankhyaJars.each { jar ->
        if (jar.exists()) {
            classpath += files(jar)
        }
    }

    // Fallback para libs
    if (file('libs').exists()) {
        classpath += fileTree(dir: 'libs', include: ['*.jar'])
    }

    options.encoding = 'UTF-8'
    // USAR A MESMA CONFIGURAÇÃO DO POWERSHELL: Java 8
    sourceCompatibility = '25'
    targetCompatibility = '25'

    // Suprimir warnings
    options.compilerArgs += ['-Xlint:-options']

    doFirst {
        println("[INFO] Compilando módulo VendaPixAdianta (modo compatibilidade PowerShell)...")
        println("[INFO] Versão Java: ${sourceCompatibility} → ${targetCompatibility}")
        println("[INFO] Arquivos: ${source.files.size()}")
        source.files.each { file ->
            println("[INFO] - ${file.name}")
        }
        println("[INFO] Classpath JARs: ${classpath.files.size()}")

        // FILTRAR apenas os arquivos que o PowerShell compila (6 arquivos)
        def expectedFiles = [
            'VendaPixAdiantaEvent.java',
            'AdiantamentoTask.java', 
            'AsyncAdiantamentoProcessor.java',
            'AdiantamentoService.java',
            'ConfiguracaoHelper.java',
            'AuditLogger.java'
        ]

        def actualFiles = source.files.collect { it.name }
        def extraFiles = actualFiles - expectedFiles

        if (extraFiles.size() > 0) {
            println("[WARNING] Arquivos extras detectados (PowerShell compila apenas 6):")
            extraFiles.each { fileName ->
                println("[WARNING]   - ${fileName}")
            }
        }

        // Verificar se há código incompatível com Java 8
        def java8IncompatibleFiles = source.files.findAll { file ->
            def content = file.text
            // CORRIGIDO: Verificar sintaxe específica, não palavras em comentários
            content.matches(/(?s).*\brecord\s+\w+.*/) || 
            content.matches(/(?s).*\bvar\s+\w+\s*=.*/) ||
            content.matches(/(?s).*\bsealed\s+(class|interface).*/) ||
            content.matches(/(?s).*\bpermits\s+.*/)
        }
        if (java8IncompatibleFiles.size() > 0) {
            println("[ERROR] Código incompatível com Java 8 detectado:")
            java8IncompatibleFiles.each { file ->
                println("[ERROR]   - ${file.name}")
            }
            println("[ERROR] O PowerShell compila com sucesso porque não inclui esses arquivos!")
            println("[ERROR] Remova ou refatore os arquivos incompatíveis.")
        }
    }

    doLast {
        def destDir = destinationDirectory.get().asFile.absolutePath
        def mainClass = file("$destDir/br/com/bellube/sankhya/eventos/VendaPixAdianta/event/VendaPixAdiantaEvent.class")

        if (!mainClass.exists()) {
            throw new GradleException("Compilação falhou - classe principal não encontrada")
        }

        println("[INFO] ✓ Classe principal compilada: VendaPixAdiantaEvent.class")
        println("[INFO] Compilação concluída com sucesso usando Java ${sourceCompatibility}")
        println("[INFO] ✓ Compatível com Sankhya ERP (Java 8)")
    }
}

// Criar JAR do VendaPixAdianta
task vendaPixAdiantaJar(type: Jar) {
    description = 'Cria o JAR VendaPixAdianta.jar'
    group = 'vendaPixAdianta'
    dependsOn compileVendaPixAdianta

    from compileVendaPixAdianta.destinationDirectory
    archiveBaseName = 'VendaPixAdianta'
    archiveVersion = ''
    destinationDirectory = file('dist')

    doLast {
        def jarLocation = archiveFile.get().asFile.absolutePath
        println("[SUCCESS] VendaPixAdianta.jar criado com sucesso!")
        println("[INFO] Localização: ${jarLocation}")
        println("[INFO] ✓ Compiled with Java 8 for Sankhya compatibility")
    }
}

