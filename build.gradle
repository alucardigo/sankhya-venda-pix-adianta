// Executar testes do VendaPixAdianta
task testVendaPixAdianta(type: Test) {
    description = 'Executa os testes do módulo VendaPixAdianta'
    group = 'vendaPixAdianta'
    dependsOn compileVendaPixAdiantaTest

    useJUnitPlatform()

    testClassesDirs = files("$buildDir/classes/vendaPixAdiantaTest")

    // CORRIGIDO: Construir classpath manualmente para Gradle 8.0+
    classpath = files("$buildDir/classes/vendaPixAdianta", "$buildDir/classes/vendaPixAdiantaTest")

    // Adicionar JARs do Sankhya se existirem
    def sankhyaJars = [
        file('SankhyaW-extensions.jar'),
        file('wildfly/wildfly/standalone/deployments/sankhyaw.ear/lib/jape.jar'),
        file('wildfly/wildfly/standalone/deployments/sankhyaw.ear/ejb/mge-modelcore.jar')
    ]

    sankhyaJars.each { jar ->
        if (jar.exists()) {
            classpath += files(jar)
        }
    }

    // Adicionar dependências de teste
    if (file('libs').exists()) {
        classpath += fileTree(dir: 'libs', include: ['*.jar'])
    }

    if (file('libs/test').exists()) {
        classpath += fileTree(dir: 'libs/test', include: ['*.jar'])
    }

    include 'br/com/bellube/sankhya/eventos/VendaPixAdianta/**/*Test.class'

    // Java 8 compatibility - no module system arguments
    jvmArgs = [
        '-Djava.util.logging.manager=org.jboss.logmanager.LogManager'
    ]

    onlyIf { 
        file("$buildDir/classes/vendaPixAdiantaTest").exists() && 
        file("$buildDir/classes/vendaPixAdiantaTest").listFiles() != null &&
        file("$buildDir/classes/vendaPixAdiantaTest").listFiles().length > 0
    }

    testLogging {
        events "passed", "skipped", "failed"
        showStandardStreams = true
        exceptionFormat = 'full'
    }

    reports {
        html.outputLocation = file("$buildDir/reports/vendaPixAdiantaTests")
        junitXml.outputLocation = file("$buildDir/test-results/vendaPixAdiantaTests")
    }

    doFirst {
        println("[INFO] =======================================")
        println("[INFO] EXECUTANDO SUÍTE DE TESTES VENDAPIXADIANTA")
        println("[INFO] =======================================")
        println("[INFO] JVM: Java ${System.getProperty('java.version')}")

        if (!file("test/br/com/bellube/sankhya/eventos/VendaPixAdianta").exists()) {
            println("[WARNING] Diretório de testes VendaPixAdianta não encontrado")
            println("[INFO] Execute 'download-test-deps.ps1' para baixar as dependências de teste")
        }

        println("[INFO] Classpath JARs: ${classpath.files.size()}")
    }

    doLast {
        println("[INFO] =======================================")
        println("[INFO] TESTES CONCLUÍDOS")
        println("[INFO] =======================================")
    }
}

